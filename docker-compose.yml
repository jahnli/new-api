# New-API Docker Compose Configuration
#
# 使用 1Panel 已有的 PostgreSQL 和 Redis 容器
#
# Quick Start:
#   1. 确保 1Panel 的 PostgreSQL (1Panel-postgresql-Umtv) 和 Redis (1Panel-redis-SRr2) 容器已运行
#   2. 在 PostgreSQL 中创建 new-api 数据库
#   3. 修改下方 SQL_DSN 中的用户名和密码
#   4. docker-compose up -d
#   5. Access at http://localhost:3000

version: '3.4'

services:
  new-api:
    image: jahnlis/new-api:latest
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - SQL_DSN=postgresql://admin:semitech@1Panel-postgresql-Umtv:5432/postgres  # ⚠️ 修改为实际的用户名和密码
      - REDIS_CONN_STRING=redis://:semitech@1Panel-redis-SRr2
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
#      - STREAMING_TIMEOUT=300
#      - SESSION_SECRET=random_string
#      - SYNC_FREQUENCY=60
    networks:
      - 1panel-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  1panel-network:
    external: true
